name: chuggernaut-work
on:
  workflow_dispatch:
    inputs:
      job_key:
        description: "Job key (e.g. acme.payments.57)"
        required: true
        type: string
      nats_url:
        description: "NATS server URL (overrides repo variable)"
        required: false
        type: string
        default: ""
      runner_label:
        description: "Runner label (maps to container image via runner config)"
        required: false
        type: string
        default: "ubuntu-latest"
      review_feedback:
        description: "Reviewer feedback for rework cycles"
        required: false
        type: string
        default: ""
      is_rework:
        description: "Whether this is a rework of a previously-reviewed run"
        required: false
        type: string
        default: "false"
      pr_url:
        description: "PR URL (passed during rework for conversation history)"
        required: false
        type: string
        default: ""

jobs:
  work:
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 60
    env:
      NATS_URL: ${{ inputs.nats_url || vars.CHUGGERNAUT_NATS_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch job details from NATS
        id: job
        run: |
          echo "Fetching job ${{ inputs.job_key }} from NATS at $NATS_URL"
          JOB_JSON=$(nats kv get chuggernaut_jobs "${{ inputs.job_key }}" --raw)
          TITLE=$(echo "$JOB_JSON" | jq -r .title)
          echo "Job title: $TITLE"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          CLAUDE_ARGS=$(echo "$JOB_JSON" | jq -r '.claude_args // ""')
          echo "claude_args=$CLAUDE_ARGS" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<CHUGGERNAUT_EOF'
            echo "$JOB_JSON" | jq -r .body
            echo 'CHUGGERNAUT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build prompt
        id: prompt
        env:
          JOB_TITLE: ${{ steps.job.outputs.title }}
          JOB_BODY: ${{ steps.job.outputs.body }}
          JOB_KEY: ${{ inputs.job_key }}
          IS_REWORK: ${{ inputs.is_rework }}
          REVIEW_FEEDBACK: ${{ inputs.review_feedback }}
        run: |
          if [ "$IS_REWORK" = "true" ] && [ -n "$REVIEW_FEEDBACK" ]; then
            # --- Rework prompt ---
            cat > /tmp/prompt.md <<'PROMPT_EOF'
          You are reworking a previously-reviewed job in this repository. A PR already exists.

          ## Instructions

          1. Read the **PR Conversation History** section at the end of this prompt (if present) to understand the full review discussion and what has already been addressed.
          2. Read the reviewer's feedback below carefully.
          3. Explore the codebase to understand the relevant code and what was already done.
          4. Address each point in the feedback.
          5. Make sure your changes are correct and complete.
          5. Do NOT create a PR or commit — just make the changes to the working tree.
          6. **REQUIRED**: When you are done, you MUST call **submit_changes** with a markdown summary of what you changed in response to the feedback. This will be posted as a comment on the existing PR.

          ## Communication

          You have access to a chuggernaut MCP server with these tools:
          - **update_status**: Report your current progress. Call this after completing each major step.
          - **channel_send**: Send a message back to the orchestrator.
          - **channel_check**: Call this periodically to check for messages from the orchestrator.
          - **submit_changes** (**REQUIRED**): You MUST call this exactly once before you finish. Provide a markdown summary describing what you changed and why. This is the sole mechanism for reporting your rework — if you do not call it, the rework will not be recorded on the PR.

          IMPORTANT: Your very first action must be to call update_status with status "starting" and progress 0. Then proceed with the rework.

          If you receive a DEADLINE WARNING, wrap up immediately: commit and push your progress, then call submit_changes with what you accomplished so far.
          PROMPT_EOF

            {
              echo "You are reworking job ${JOB_KEY} in this repository."
              echo ""
              echo "## Original task: ${JOB_TITLE}"
              echo ""
              echo "${JOB_BODY}"
              echo ""
              echo "## Reviewer feedback"
              echo ""
              echo "${REVIEW_FEEDBACK}"
              echo ""
              cat /tmp/prompt.md
            } > /tmp/full-prompt.md
          else
            # --- Initial work prompt ---
            cat > /tmp/prompt.md <<'PROMPT_EOF'
          You are working on a job in this repository.

          ## Instructions

          1. Read the task carefully and understand what needs to be done.
          2. Explore the codebase to understand the relevant code.
          3. Implement the requested changes.
          4. Make sure your changes are correct and complete.
          5. Do NOT create a PR or commit — just make the changes to the working tree.
          6. **REQUIRED**: When you are done, you MUST call **submit_pr** with a descriptive title and a markdown body explaining what you changed and why. Your work will not be submitted without this step.

          ## Communication

          You have access to a chuggernaut MCP server with these tools:
          - **update_status**: Report your current progress. Call this after completing each major step (e.g. "exploring codebase", "implementing feature", "running tests"). Include a progress percentage if you can estimate one.
          - **channel_send**: Send a message back to the orchestrator (e.g. to reply to a status request).
          - **channel_check**: Call this periodically (every few major steps) to check for messages from the orchestrator. If someone requests a status update, respond via channel_send.
          - **submit_pr** (**REQUIRED**): You MUST call this exactly once before you finish. Provide a short descriptive title and a markdown body summarizing your changes. This is the sole mechanism for submitting your PR metadata — if you do not call it, the PR will have no title or description.

          IMPORTANT: Your very first action must be to call update_status with status "starting" and progress 0. This confirms the communication channel is working. Then proceed with the task.

          If you receive a DEADLINE WARNING, wrap up immediately: commit and push your progress, then call submit_pr with what you accomplished so far.
          PROMPT_EOF

            {
              echo "You are working on job ${JOB_KEY} in this repository."
              echo ""
              echo "## ${JOB_TITLE}"
              echo ""
              echo "${JOB_BODY}"
              echo ""
              cat /tmp/prompt.md
            } > /tmp/full-prompt.md
          fi

          {
            echo 'value<<CHUGGERNAUT_EOF'
            cat /tmp/full-prompt.md
            echo 'CHUGGERNAUT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Execute chuggernaut worker
        shell: bash
        run: |
          chuggernaut-worker \
            --post-action yield \
            --job-key "${{ inputs.job_key }}" \
            --nats-url "$NATS_URL" \
            --git-url "${{ github.server_url }}" \
            --pr-url "${{ inputs.pr_url }}" \
            --review-level "high"
        env:
          CHUGGERNAUT_GIT_TOKEN: ${{ secrets.CHUGGERNAUT_WORKER_TOKEN }}
          CHUGGERNAUT_COMMAND: claude
          CHUGGERNAUT_COMMAND_ARGS: "${{ steps.job.outputs.claude_args }} --verbose --output-format stream-json --include-partial-messages --allowedTools Bash Read Write Edit Glob Grep Agent mcp__chuggernaut__channel_check mcp__chuggernaut__channel_send mcp__chuggernaut__update_status mcp__chuggernaut__submit_pr mcp__chuggernaut__submit_changes"
          CHUGGERNAUT_TIMEOUT_MINUTES: "60"
          CHUGGERNAUT_PROMPT: ${{ steps.prompt.outputs.value }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
