name: chuggernaut-work
on:
  workflow_dispatch:
    inputs:
      job_key:
        description: "Job key (e.g. acme.payments.57)"
        required: true
        type: string
      nats_url:
        description: "NATS server URL (overrides repo variable)"
        required: false
        type: string
        default: ""
      runner_label:
        description: "Runner label (maps to container image via runner config)"
        required: false
        type: string
        default: "ubuntu-latest"
      review_feedback:
        description: "Reviewer feedback for rework cycles"
        required: false
        type: string
        default: ""
      is_rework:
        description: "Whether this is a rework of a previously-reviewed run"
        required: false
        type: string
        default: "false"

jobs:
  work:
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 60
    env:
      NATS_URL: ${{ inputs.nats_url || vars.CHUGGERNAUT_NATS_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch job details from NATS
        id: job
        run: |
          echo "Fetching job ${{ inputs.job_key }} from NATS at $NATS_URL"
          JOB_JSON=$(nats kv get chuggernaut_jobs "${{ inputs.job_key }}" --raw)
          TITLE=$(echo "$JOB_JSON" | jq -r .title)
          echo "Job title: $TITLE"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          CLAUDE_ARGS=$(echo "$JOB_JSON" | jq -r '.claude_args // ""')
          echo "claude_args=$CLAUDE_ARGS" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<CHUGGERNAUT_EOF'
            echo "$JOB_JSON" | jq -r .body
            echo 'CHUGGERNAUT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build prompt
        id: prompt
        env:
          JOB_TITLE: ${{ steps.job.outputs.title }}
          JOB_BODY: ${{ steps.job.outputs.body }}
          JOB_KEY: ${{ inputs.job_key }}
          IS_REWORK: ${{ inputs.is_rework }}
          REVIEW_FEEDBACK: ${{ inputs.review_feedback }}
        run: |
          cat > /tmp/prompt.md <<'PROMPT_EOF'
          You are working on a job in this repository.

          ## Instructions

          1. Read the task carefully and understand what needs to be done.
          2. Explore the codebase to understand the relevant code.
          3. Implement the requested changes.
          4. Make sure your changes are correct and complete.
          5. Do NOT create a PR or commit — just make the changes to the working tree.

          ## Communication

          You have access to a chuggernaut MCP server with these tools:
          - **update_status**: Report your current progress. Call this after completing each major step (e.g. "exploring codebase", "implementing feature", "running tests"). Include a progress percentage if you can estimate one.
          - **channel_send**: Send a message back to the orchestrator (e.g. to reply to a status request).
          - **channel_check**: Call this periodically (every few major steps) to check for messages from the orchestrator. If someone requests a status update, respond via channel_send.

          IMPORTANT: Your very first action must be to call update_status with status "starting" and progress 0. This confirms the communication channel is working. Then proceed with the task.

          If you receive a DEADLINE WARNING, wrap up immediately: commit and push your progress.
          PROMPT_EOF

          # Prepend dynamic content (safe from shell expansion)
          {
            echo "You are working on job ${JOB_KEY} in this repository."
            echo ""
            echo "## ${JOB_TITLE}"
            echo ""
            echo "${JOB_BODY}"
            echo ""
            cat /tmp/prompt.md
          } > /tmp/full-prompt.md

          if [ "$IS_REWORK" = "true" ] && [ -n "$REVIEW_FEEDBACK" ]; then
            {
              echo ""
              echo "## Rework"
              echo ""
              echo "A reviewer has requested changes. Address the following feedback:"
              echo ""
              echo "$REVIEW_FEEDBACK"
            } >> /tmp/full-prompt.md
          fi

          {
            echo 'value<<CHUGGERNAUT_EOF'
            cat /tmp/full-prompt.md
            echo 'CHUGGERNAUT_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: {{ACTIONS_URL}}/chuggernaut/actions/chug@main
        with:
          job_key: ${{ inputs.job_key }}
          nats_url: ${{ env.NATS_URL }}
          forgejo_url: ${{ github.server_url }}
          forgejo_token: ${{ secrets.CHUGGERNAUT_WORKER_TOKEN }}
          post_action: yield
          prompt: ${{ steps.prompt.outputs.value }}
          command_args: "${{ steps.job.outputs.claude_args }} --verbose --output-format stream-json --include-partial-messages --allowedTools Bash Read Write Edit Glob Grep Agent mcp__chuggernaut__channel_check mcp__chuggernaut__channel_send mcp__chuggernaut__update_status"
          timeout_minutes: "60"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
