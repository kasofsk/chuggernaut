name: chuggernaut-review
on:
  workflow_dispatch:
    inputs:
      job_key:
        description: "Job key (e.g. acme.payments.57)"
        required: true
        type: string
      nats_url:
        description: "NATS server URL (overrides repo variable)"
        required: false
        type: string
        default: ""
      pr_url:
        description: "PR URL to review"
        required: true
        type: string
      review_level:
        description: "Review level: low, medium, high"
        required: false
        type: string
        default: "high"
      runner_label:
        description: "Runner label (maps to container image via runner config)"
        required: false
        type: string
        default: "ubuntu-latest"

jobs:
  review:
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 30
    env:
      NATS_URL: ${{ inputs.nats_url || vars.CHUGGERNAUT_NATS_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch job details from NATS
        id: job
        run: |
          echo "Fetching job ${{ inputs.job_key }} from NATS at $NATS_URL"
          JOB_JSON=$(nats kv get chuggernaut_jobs "${{ inputs.job_key }}" --raw)
          TITLE=$(echo "$JOB_JSON" | jq -r .title)
          echo "Job title: $TITLE"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          CLAUDE_ARGS=$(echo "$JOB_JSON" | jq -r '.claude_args // ""')
          echo "claude_args=$CLAUDE_ARGS" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<CHUGGERNAUT_EOF'
            echo "$JOB_JSON" | jq -r .body
            echo 'CHUGGERNAUT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build prompt
        id: prompt
        env:
          JOB_TITLE: ${{ steps.job.outputs.title }}
          JOB_BODY: ${{ steps.job.outputs.body }}
          REVIEW_LEVEL: ${{ inputs.review_level }}
        run: |
          {
            echo "You are a code reviewer. Review the following pull request."
            echo ""
            echo "## Job: ${JOB_TITLE}"
            echo ""
            echo "${JOB_BODY}"
            echo ""
            echo "## Review Level: ${REVIEW_LEVEL}"
            echo ""
            cat <<'PROMPT_EOF'
          - **low**: Approve if the changes are roughly correct and don't introduce obvious bugs.
          - **medium**: Approve if the changes correctly implement the requirements with reasonable code quality.
          - **high**: Approve only if the changes are correct, complete, well-tested, and follow project conventions.

          ## Instructions

          1. Run `git diff origin/main...HEAD` to see what changed in this PR.
          2. Read the changed files and surrounding code to understand context.
          3. Consider: Does the implementation match the job? Are there bugs, edge cases, or security issues? Is code quality acceptable for the review level?

          You have access to a chuggernaut MCP server. Use **update_status** to report your review progress. Use **channel_check** periodically to check for messages from the orchestrator.

          You MUST end your response with a JSON object on its own line:
          {"decision": "approved"} or {"decision": "changes_requested", "feedback": "..."} or {"decision": "escalate"}

          After the JSON line, write nothing else.
          PROMPT_EOF
          } > /tmp/prompt.md

          {
            echo 'value<<CHUGGERNAUT_EOF'
            cat /tmp/prompt.md
            echo 'CHUGGERNAUT_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: {{ACTIONS_URL}}/chuggernaut/actions/chug@main
        with:
          job_key: ${{ inputs.job_key }}
          nats_url: ${{ env.NATS_URL }}
          forgejo_url: ${{ github.server_url }}
          forgejo_token: ${{ secrets.CHUGGERNAUT_REVIEWER_TOKEN }}
          post_action: review
          prompt: ${{ steps.prompt.outputs.value }}
          command_args: "${{ steps.job.outputs.claude_args }} --allowedTools Bash Read Glob Grep mcp__chuggernaut__channel_check mcp__chuggernaut__channel_send mcp__chuggernaut__update_status"
          timeout_minutes: "30"
          pr_url: ${{ inputs.pr_url }}
          review_level: ${{ inputs.review_level }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
