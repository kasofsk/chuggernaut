name: chuggernaut-review
on:
  workflow_dispatch:
    inputs:
      job_key:
        description: "Job key (e.g. acme.payments.57)"
        required: true
        type: string
      nats_url:
        description: "NATS server URL (overrides repo variable)"
        required: false
        type: string
        default: ""
      pr_url:
        description: "PR URL to review"
        required: true
        type: string
      review_level:
        description: "Review level: low, medium, high"
        required: false
        type: string
        default: "high"
      runner_label:
        description: "Runner label (maps to container image via runner config)"
        required: false
        type: string
        default: "ubuntu-latest"

jobs:
  review:
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 30
    env:
      NATS_URL: ${{ inputs.nats_url || vars.CHUGGERNAUT_NATS_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch job details from NATS
        id: job
        run: |
          echo "Fetching job ${{ inputs.job_key }} from NATS at $NATS_URL"
          JOB_JSON=$(nats kv get chuggernaut_jobs "${{ inputs.job_key }}" --raw)
          TITLE=$(echo "$JOB_JSON" | jq -r .title)
          echo "Job title: $TITLE"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          CLAUDE_ARGS=$(echo "$JOB_JSON" | jq -r '.claude_args // ""')
          echo "claude_args=$CLAUDE_ARGS" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<CHUGGERNAUT_EOF'
            echo "$JOB_JSON" | jq -r .body
            echo 'CHUGGERNAUT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build prompt
        id: prompt
        env:
          JOB_TITLE: ${{ steps.job.outputs.title }}
          JOB_BODY: ${{ steps.job.outputs.body }}
          REVIEW_LEVEL: ${{ inputs.review_level }}
        run: |
          {
            echo "You are a code reviewer. Review the following pull request."
            echo ""
            echo "## Job: ${JOB_TITLE}"
            echo ""
            echo "${JOB_BODY}"
            echo ""
            echo "## Review Level: ${REVIEW_LEVEL}"
            echo ""
            cat <<'PROMPT_EOF'
          - **low**: Approve if the changes are roughly correct and don't introduce obvious bugs.
          - **medium**: Approve if the changes correctly implement the requirements with reasonable code quality.
          - **high**: Approve only if the changes are correct, complete, well-tested, and follow project conventions.

          ## Instructions

          1. Read the **PR Conversation History** section at the end of this prompt (if present) to understand prior feedback and what has already been discussed or addressed.
          2. Run `git diff origin/main...HEAD` to see what changed in this PR.
          3. Read the changed files and surrounding code to understand context.
          4. Consider: Does the implementation match the job? Are there bugs, edge cases, or security issues? Is code quality acceptable for the review level? Have previously requested changes been addressed?
          5. **REQUIRED**: When you have reached your decision, you MUST call **submit_review** with your decision and feedback. Your review will not be recorded without this step.

          ## Communication

          You have access to a chuggernaut MCP server with these tools:
          - **update_status**: Report your review progress. Call this after completing each major step.
          - **channel_check**: Call periodically to check for messages from the orchestrator.
          - **channel_send**: Send a message back to the orchestrator.
          - **submit_review** (**REQUIRED**): You MUST call this exactly once before you finish. Provide a decision ("approved", "changes_requested", or "escalate") and feedback explaining your reasoning. This is the sole mechanism for submitting your review — if you do not call it, the review will be escalated to a human.

          IMPORTANT: Your very first action must be to call update_status with status "starting" and progress 0. Then proceed with the review.
          PROMPT_EOF
          } > /tmp/prompt.md

          {
            echo 'value<<CHUGGERNAUT_EOF'
            cat /tmp/prompt.md
            echo 'CHUGGERNAUT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Execute chuggernaut worker
        shell: bash
        run: |
          chuggernaut-worker \
            --post-action review \
            --job-key "${{ inputs.job_key }}" \
            --nats-url "$NATS_URL" \
            --git-url "${{ github.server_url }}" \
            --pr-url "${{ inputs.pr_url }}" \
            --review-level "${{ inputs.review_level }}"
        env:
          CHUGGERNAUT_GIT_TOKEN: ${{ secrets.CHUGGERNAUT_REVIEWER_TOKEN }}
          CHUGGERNAUT_COMMAND: claude
          CHUGGERNAUT_COMMAND_ARGS: "${{ steps.job.outputs.claude_args }} --verbose --output-format stream-json --include-partial-messages --allowedTools Bash Read Glob Grep mcp__chuggernaut__channel_check mcp__chuggernaut__channel_send mcp__chuggernaut__update_status mcp__chuggernaut__submit_review"
          CHUGGERNAUT_TIMEOUT_MINUTES: "30"
          CHUGGERNAUT_PROMPT: ${{ steps.prompt.outputs.value }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
