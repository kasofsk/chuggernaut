services:
  nats:
    image: nats:latest
    command: ["--jetstream", "--config", "/etc/nats/nats-server.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
    restart: unless-stopped

  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - forgejo-data:/data
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__actions__ENABLED=true
      - FORGEJO__server__ROOT_URL=http://localhost:3000
      - FORGEJO__server__SSH_PORT=2222
    restart: unless-stopped

  dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["chuggernaut-dispatcher"]
    ports:
      - "8080:8080"
    environment:
      CHUGGERNAUT_NATS_URL: nats://nats:4222
      CHUGGERNAUT_NATS_WORKER_URL: nats://host.docker.internal:4222
      CHUGGERNAUT_HTTP_LISTEN: "0.0.0.0:8080"
      CHUGGERNAUT_FORGEJO_URL: http://forgejo:3000
      CHUGGERNAUT_FORGEJO_TOKEN: ${CHUGGERNAUT_FORGEJO_TOKEN:-}
      CHUGGERNAUT_MAX_CONCURRENT_ACTIONS: ${CHUGGERNAUT_MAX_CONCURRENT_ACTIONS:-${CHUGGERNAUT_RUNNER_COUNT:-1}}
      CHUGGERNAUT_ACTION_WORKFLOW: work.yml
      CHUGGERNAUT_REVIEW_WORKFLOW: review.yml
      CHUGGERNAUT_RUNNER_LABEL_MAP: ${CHUGGERNAUT_RUNNER_LABEL_MAP:-}
      CHUGGERNAUT_STATIC_DIR: /static
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./static:/static:ro
    depends_on:
      - nats
      - forgejo
    restart: unless-stopped

  runner:
    image: data.forgejo.org/forgejo/runner:11
    user: root
    deploy:
      replicas: ${CHUGGERNAUT_RUNNER_COUNT:-1}
    depends_on:
      - forgejo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/runner/config.yaml:/data/config.yaml:ro
      - ./infra/runner/entrypoint.sh:/entrypoint.sh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FORGEJO_URL: http://host.docker.internal:3000
      FORGEJO_ADMIN_USER: ${FORGEJO_ADMIN_USER:-chuggernaut-admin}
      FORGEJO_ADMIN_PASS: ${FORGEJO_ADMIN_PASS:-chuggernaut-admin}
      RUNNER_LABELS: ${CHUGGERNAUT_RUNNER_LABELS:-ubuntu-latest:docker://chuggernaut-runner-env:latest}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: unless-stopped

  # Build runner environment images.
  # Via compose:  docker compose --profile build build
  # Via dev-up:   ./scripts/dev-up.sh --flavor flutter
  runner-env:
    build:
      context: .
      dockerfile: Dockerfile.runner-env
    image: chuggernaut-runner-env:latest
    profiles:
      - build

  runner-env-rust:
    build:
      context: .
      dockerfile: Dockerfile.runner-env.rust
    image: chuggernaut-runner-env:rust
    profiles:
      - build

  runner-env-flutter:
    build:
      context: .
      dockerfile: Dockerfile.runner-env.flutter
    image: chuggernaut-runner-env:flutter
    profiles:
      - build

volumes:
  nats-data:
  forgejo-data:
